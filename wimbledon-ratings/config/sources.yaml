# ---------------------------------------------------------------------------
# Free open tennis data sources.
#
# IMPORTANT LICENCE NOTE (read before going commercial):
#   The Jeff Sackmann datasets (tennis_atp, tennis_wta, MatchChartingProject)
#   are CC BY-NC-SA 4.0 -> NON-COMMERCIAL. They are perfect for this free MVP /
#   prototype, but the serve / return / net detail derived from them must be
#   licensed or replaced before any commercial launch. See data/processed/
#   licence_map.csv (generated by the pipeline) for the exact field-by-field
#   breakdown of what is "clean" vs "prototype-only".
#
#   FACTS (match results, scores, draws, rankings) are NOT copyrightable and are
#   used here to compute Elo, win%, and ranking percentiles in-house -> CLEAN.
# ---------------------------------------------------------------------------

# Career/peak window. "Last 20 years at Wimbledon" => ideally 2006-2025.
#
# REALITY (checked 2026-06-30): Jeff Sackmann removed the canonical tennis_atp /
# tennis_wta repos from his account. The best FREE mirrors that keep the original
# file layout are community forks, and they are frozen at different points:
#   * ATP  stakah/tennis_atp     -> matches through 2018
#   * WTA  ppaulojr/tennis_wta   -> matches through 2015
# So the free MVP effectively covers ~2006-2018 (men) / 2006-2015 (women). This
# captures the Federer/Nadal/Djokovic/Murray and Williams/Sharapova/Azarenka era
# very well, but NOT players who emerged afterwards (Alcaraz, Sinner, Swiatek,
# Gauff, ...). Extending to the present needs a maintained mirror or a licensed
# feed - see README "Limitations". Each tour's window is set under sackmann.tours.
year_start: 2006
year_end: 2018          # global upper bound; per-tour availability clamps below

# Surfaces counted as "grass" in the raw data.
grass_surfaces: ["Grass"]

# Minimum grass sample (serve points) before a player's serve/return metrics are
# trusted as data rather than flagged for editorial review.
min_serve_points: 150
min_grass_matches: 8

sackmann:
  # We FETCH these flat files rather than scraping any official site (more robust
  # + avoids site ToS / database-right issues). Per-tour base URL + year_end so
  # each tour only requests the years its mirror actually has (no 404 noise).
  # To extend coverage later, point a tour's `base` at a more current mirror (or
  # your own licensed copy) and raise its `year_end`.
  tours:
    atp:
      base: "https://raw.githubusercontent.com/stakah/tennis_atp/master"
      year_end: 2018
    wta:
      base: "https://raw.githubusercontent.com/ppaulojr/tennis_wta/master"
      year_end: 2015
  # Match Charting Project is still on Jeff Sackmann's account and still works.
  mcp_base: "https://raw.githubusercontent.com/JeffSackmann/tennis_MatchChartingProject/master"
  licence: "CC BY-NC-SA 4.0"
  commercial_safe: false

wikidata:
  # Optional, best-effort bio enrichment (CC0 = commercial-safe). Off by default;
  # Sackmann players files already provide hand / height / country / dob.
  sparql: "https://query.wikidata.org/sparql"
  licence: "CC0"
  commercial_safe: true
  enabled: false

# Where downloaded raw files are cached.
cache_dir: "data/raw"
interim_dir: "data/interim"
processed_dir: "data/processed"
